services:
  # Auth Service Database
  auth-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./auth-service/migrations:/docker-entrypoint-initdb.d:ro
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Books Service Database
  books-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: books
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./books-service/migrations:/docker-entrypoint-initdb.d:ro
      - books_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Auth Service (Go)
  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      DATABASE_URL: "postgres://postgres:postgres@auth-postgres:5432/auth?sslmode=disable"
      SERVICE_KEY: "dev-service-key"
    depends_on:
      auth-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # Books Service (Go)
  books-service:
    build: ./books-service
    ports:
      - "8082:8082"
    environment:
      PORT: "8082"
      DATABASE_URL: "postgres://postgres:postgres@books-postgres:5432/books?sslmode=disable"
      AUTH_SERVICE_URL: "http://auth-service:8081"
      SERVICE_KEY: "dev-service-key"
    depends_on:
      books-postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8082/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # Frontend Application
  frontend:
    build: ./frontend
    ports:
      - "5174:80"
    depends_on:
      auth-postgres:
        condition: service_healthy
      books-postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      books-service:
        condition: service_healthy

volumes:
  auth_postgres_data:
  books_postgres_data:
